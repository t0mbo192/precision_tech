<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ Title }}</title>
    <link href="/index.css" rel="stylesheet" />
  </head>

  <body>
    <div class="page-shell">
      <div class="terminal">
        <div class="terminal-bar" aria-hidden="true">
          <span class="terminal-title">tom@precision-tech: ~</span>
          <span class="terminal-meta">bash</span>
        </div>

        <div class="terminal-body">
          <header class="site-header">
            <a class="site-brand" href="/"><span class="prompt-user">tom</span>@<span class="prompt-host">precision-tech</span></a>
            <nav class="site-nav" aria-label="Primary navigation">
              <a href="/">~/home</a>
              <a href="/projects">~/projects</a>
              <a href="/contact">~/contact</a>
            </nav>
          </header>

          <article class="page-content">{{ Content }}</article>

          <footer class="site-footer">
            <p class="footer-prompt" aria-hidden="true"><span class="prompt-user">tom</span>@<span class="prompt-host">precision-tech</span>:~$ <span class="cursor">&#9608;</span></p>
          </footer>
        </div>
      </div>
    </div>
  </body>
</html>
